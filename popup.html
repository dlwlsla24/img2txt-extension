<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>이미지 텍스트 추출기</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- 헤더 -->
    <header class="header">
      <div class="header-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M3 16l5-5 4 4 4-6 5 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 10h4v1h-4z" fill="currentColor" opacity="0.5"/>
          <path d="M15 12h3v1h-3z" fill="currentColor" opacity="0.5"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>이미지 텍스트 추출기</h1>
        <p class="subtitle">상품 상세 이미지에서 텍스트를 추출합니다</p>
      </div>
    </header>

    <!-- 상태 표시 -->
    <div id="status-area" class="status-area">
      <div class="status-icon" id="status-icon">
        <div class="spinner"></div>
      </div>
      <p class="status-text" id="status-text">페이지 분석 중...</p>
    </div>

    <!-- 이미지 목록 -->
    <div id="image-list-section" class="section hidden">
      <div class="section-header">
        <h2>발견된 이미지</h2>
        <span class="badge" id="image-count">0</span>
      </div>
      <div id="image-list" class="image-list"></div>
    </div>

    <!-- 추출 버튼 -->
    <div id="action-area" class="action-area hidden">
      <button id="extract-btn" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M9 12h6M12 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
        </svg>
        텍스트 추출 시작
      </button>
      <div class="extract-options">
        <label class="checkbox-label">
          <input type="checkbox" id="select-all" checked>
          <span>전체 선택</span>
        </label>
      </div>
    </div>

    <!-- 진행 상황 -->
    <div id="progress-area" class="section hidden">
      <div class="section-header">
        <h2>추출 진행 중</h2>
        <span class="badge" id="progress-count">0/0</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="progress-detail" id="progress-detail">준비 중...</p>
    </div>

    <!-- 결과 -->
    <div id="result-area" class="section hidden">
      <div class="section-header">
        <h2>추출 결과</h2>
        <div class="header-actions">
          <button id="copy-btn" class="btn-small" title="텍스트 복사">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
            </svg>
            복사
          </button>
          <button id="download-btn" class="btn-small" title="텍스트 파일 다운로드">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            다운로드
          </button>
        </div>
      </div>
      <div id="result-text" class="result-text"></div>
      <div id="copy-toast" class="toast hidden">✅ 클립보드에 복사되었습니다!</div>
    </div>

    <!-- 에러 -->
    <div id="error-area" class="section hidden">
      <div class="error-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p id="error-text">오류가 발생했습니다.</p>
      </div>
      <button id="retry-btn" class="btn-secondary">다시 시도</button>
    </div>

    <!-- 푸터 -->
    <footer class="footer">
      <p>Tesseract.js 기반 한국어 OCR · <a href="#" id="help-link">사용법</a></p>
    </footer>
  </div>

  <script src="libs/tesseract.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
