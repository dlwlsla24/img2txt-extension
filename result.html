<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 텍스트 추출 결과</title>
  <link rel="stylesheet" href="result.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- 헤더 -->
    <header class="header">
      <div class="header-content">
        <div class="header-left">
          <div class="header-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 16l5-5 4 4 4-6 5 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <h1>이미지 텍스트 추출기</h1>
            <p class="header-subtitle" id="page-info">로딩 중...</p>
          </div>
        </div>
      </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="main">

      <!-- 설정 (OCR 엔진 선택) -->
      <section id="settings-section" class="card hidden">
        <div class="card-header">
          <h2>⚙️ OCR 엔진 설정</h2>
        </div>

        <div class="engine-status-box">
          <p class="engine-status" id="engine-status">로딩 중...</p>
        </div>

        <!-- OCR 엔진 선택 -->
        <div class="engine-selector">
          <label class="engine-option selected" id="option-ocrspace">
            <input type="radio" name="engine" value="ocrspace" checked>
            <div class="engine-card">
              <div class="engine-card-header">
                <span class="engine-name">🌐 OCR.space</span>
                <span class="engine-badge free">무료 추천</span>
              </div>
              <p class="engine-desc">카드 등록 없이 무료 · 월 25,000건 · 한국어 지원</p>
            </div>
          </label>
          <label class="engine-option" id="option-gcv">
            <input type="radio" name="engine" value="gcv">
            <div class="engine-card">
              <div class="engine-card-header">
                <span class="engine-name">☁️ Google Cloud Vision</span>
                <span class="engine-badge paid">결제 필요</span>
              </div>
              <p class="engine-desc">최고 정확도 · 월 1,000건 무료 · 결제 수단 등록 필요</p>
            </div>
          </label>
          <label class="engine-option" id="option-tesseract">
            <input type="radio" name="engine" value="tesseract">
            <div class="engine-card">
              <div class="engine-card-header">
                <span class="engine-name">🔧 Tesseract.js</span>
                <span class="engine-badge offline">오프라인</span>
              </div>
              <p class="engine-desc">API 키 불필요 · 오프라인 동작 · 낮은 정확도</p>
            </div>
          </label>
        </div>

        <!-- API 키 입력 영역 -->
        <div class="api-key-area" id="api-key-area">
          <label class="api-label" id="api-label">API 키</label>
          <p class="api-description" id="api-description"></p>
          <div class="api-key-row">
            <input type="password" id="api-key-input" class="api-input" placeholder="API 키 입력">
            <button id="save-key-btn" class="btn-save">저장</button>
          </div>
        </div>

        <button id="start-btn" class="btn-start">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <polygon points="5,3 19,12 5,21" fill="currentColor"/>
          </svg>
          텍스트 추출 시작
        </button>
      </section>

      <!-- 진행 상황 -->
      <section id="progress-section" class="card hidden">
        <div class="card-header">
          <h2>📊 추출 진행 상황</h2>
          <span class="badge" id="progress-count">0/0</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-info">
          <span class="progress-status" id="progress-status">준비 중...</span>
          <span class="progress-percent" id="progress-percent">0%</span>
        </div>
        <div class="current-image-area" id="current-image-area">
          <img id="current-image" class="current-image" alt="현재 처리 중인 이미지">
          <p class="current-image-label" id="current-image-label">처리 대기 중...</p>
        </div>
      </section>

      <!-- 결과 영역 -->
      <section id="result-section" class="card hidden">
        <div class="card-header">
          <h2>📝 추출된 텍스트</h2>
          <div class="header-actions">
            <button id="copy-btn" class="btn-action">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
              </svg>
              전체 복사
            </button>
            <button id="download-btn" class="btn-action">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M12 3v12m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              .txt 다운로드
            </button>
          </div>
        </div>
        <div id="result-list" class="result-list"></div>
      </section>

      <!-- 에러 -->
      <section id="error-section" class="card hidden">
        <div class="error-box">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <p id="error-text">오류가 발생했습니다.</p>
        </div>
      </section>
    </main>

    <div id="copy-toast" class="toast hidden">✅ 클립보드에 복사되었습니다!</div>
  </div>

  <script src="libs/tesseract.min.js"></script>
  <script src="result.js"></script>
</body>
</html>
